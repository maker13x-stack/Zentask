<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ZenTask</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1e1e23;
    --border: #2a2a32;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --danger: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --cal: #34a853;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: rgba(13,13,15,0.9);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    letter-spacing: -1px;
  }
  .logo span { color: var(--accent); }

  .gcal-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    background: var(--surface2);
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .gcal-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cal);
    box-shadow: 0 0 8px var(--cal);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .container { max-width: 860px; margin: auto; padding: 32px 24px; }

  /* Add form */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .add-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }

  .form-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted);
    margin-bottom: 16px;
  }

  .form-row { display: flex; gap: 12px; flex-wrap: wrap; }

  input[type="text"], input[type="datetime-local"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"] { flex: 2; min-width: 180px; }
  input[type="datetime-local"] { flex: 1.5; min-width: 200px; }
  select { flex: 1; min-width: 140px; }

  input:focus, select:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
  }

  input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7);
  }

  .repeat-wrap {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .repeat-wrap input[type="checkbox"] {
    accent-color: var(--accent2);
    width: 16px; height: 16px;
    cursor: pointer;
  }

  .add-btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #a7f3d0; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* Stats row */
  .stats-row {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 8px;
    font-size: 12px; color: var(--muted);
  }
  .stat-chip strong { color: var(--text); }

  /* Task list */
  .section-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted);
    margin-bottom: 12px;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 16px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-item:hover { border-color: var(--border); background: var(--surface2); }
  .task-item.completed { opacity: 0.45; }
  .task-item.completed .task-text { text-decoration: line-through; color: var(--muted); }
  .task-item.overdue { border-color: rgba(248,113,113,0.3); }
  .task-item.overdue .task-deadline { color: var(--danger); }

  /* Custom checkbox */
  .check-wrap { position: relative; flex-shrink: 0; }
  .check-wrap input[type="checkbox"] { display: none; }
  .check-wrap label {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
    background: transparent;
  }
  .check-wrap input:checked + label {
    background: var(--accent); border-color: var(--accent);
  }
  .check-wrap input:checked + label::after {
    content: '✓'; font-size: 13px; color: #0d0d0f; font-weight: bold;
  }
  .check-wrap label:hover { border-color: var(--accent); }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .task-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .task-deadline { font-size: 12px; color: var(--muted); }
  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .badge.daily { background: rgba(129,140,248,0.15); color: var(--accent2); border: 1px solid rgba(129,140,248,0.3); }
  .badge.cal { background: rgba(52,168,83,0.15); color: #4ade80; border: 1px solid rgba(52,168,83,0.3); }

  .task-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 14px;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.danger:hover { background: rgba(248,113,113,0.15); color: var(--danger); border-color: rgba(248,113,113,0.3); }
  .icon-btn.gcal-btn:hover { background: rgba(52,168,83,0.15); color: #4ade80; border-color: rgba(52,168,83,0.3); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
    border: 1px dashed var(--border); border-radius: 12px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 14px 20px;
    border-radius: 12px; font-size: 13px;
    max-width: 320px; z-index: 1000;
    display: flex; gap: 10px; align-items: flex-start;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: toastIn 0.3s ease;
    cursor: pointer;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .toast.success { border-color: rgba(110,231,183,0.4); }
  .toast.error { border-color: rgba(248,113,113,0.4); }
  .toast-icon { font-size: 18px; flex-shrink: 0; }
  .toast-msg b { display: block; margin-bottom: 2px; }
  .toast-msg small { color: var(--muted); }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .container { padding: 20px 16px; }
    .add-card { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Zen<span>Task</span></div>
  <div class="gcal-badge">
    <div class="dot"></div>
    Google Calendar connected
  </div>
</header>

<div class="container">
  <!-- Add Task -->
  <div class="add-card">
    <div class="form-label">New Task</div>
    <div class="form-row">
      <input type="text" id="taskInput" placeholder="What needs doing?">
      <input type="datetime-local" id="deadlineInput">
      <div style="flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--accent);display:flex;align-items:center;gap:8px;">
        🔔 <span>Daily alerts: <b>7:00 AM · 5:00 PM · 8:30 PM</b></span>
      </div>
    </div>
    <div class="form-row" style="margin-top:12px; align-items:center;">
      <label class="repeat-wrap">
        <input type="checkbox" id="repeatInput">
        <span>🔁 Repeat Daily</span>
      </label>
      <label class="repeat-wrap" style="margin-left:8px;">
        <input type="checkbox" id="gcalInput" checked>
        <span>📅 Add to Google Calendar</span>
      </label>
      <button class="add-btn" onclick="addTask()">+ Add Task</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Task list -->
  <div class="section-label">Tasks</div>
  <div id="taskList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1Z7JtGwQeuJRW3QScYCGFRfe7snyvzfw",
  authDomain: "zentask-a9445.firebaseapp.com",
  projectId: "zentask-a9445",
  storageBucket: "zentask-a9445.firebasestorage.app",
  messagingSenderId: "984918593234",
  appId: "1:984918593234:web:6e8be13ec1ab6f71cae70b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksCollection = collection(db, "tasks");
const taskList = document.getElementById("taskList");
const statsRow = document.getElementById("statsRow");

// ─── Google Calendar via Claude AI API ───────────────────────────────────────

// Daily reminder slots: 7:00 AM, 5:00 PM, 8:30 PM
const REMINDER_SLOTS = [
  { label: "Morning",   hour: 7,  minute: 0  },
  { label: "Evening",   hour: 17, minute: 0  },
  { label: "Night",     hour: 20, minute: 30 },
];

function getDaysUntilDeadline(deadlineISO) {
  const days = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const end   = new Date(deadlineISO); end.setHours(0,0,0,0);
  for (let d = new Date(today); d <= end; d.setDate(d.getDate() + 1)) {
    days.push(new Date(d).toISOString().split("T")[0]);
  }
  return days;
}

function buildCalendarPrompt(task) {
  const days = getDaysUntilDeadline(task.deadline).slice(0, 7);
  const events = [];
  for (const day of days) {
    for (const slot of REMINDER_SLOTS) {
      const start = new Date(`${day}T${String(slot.hour).padStart(2,"0")}:${String(slot.minute).padStart(2,"0")}:00`);
      const end   = new Date(start.getTime() + 15 * 60 * 1000);
      events.push({ label: `${slot.label} ${day}`, start: start.toISOString(), end: end.toISOString() });
    }
  }
  const eventList = events.map((e,i) =>
    `${i+1}. Title: "⏰ ${task.text}" | Start: ${e.start} | End: ${e.end} | Reminder: 0 min before | Description: ZenTask reminder (${e.label})`
  ).join("\n");

  return `You are a Google Calendar assistant. Create the following ${events.length} reminder events using the Google Calendar MCP tool:\n\n${eventList}\n\nTask: "${task.text}" | Deadline: ${new Date(task.deadline).toLocaleString()}. Create all events now.`;
}

async function addToGoogleCalendar(task) {
  try {
    const days = getDaysUntilDeadline(task.deadline).slice(0, 7);
    const totalEvents = days.length * REMINDER_SLOTS.length;
    const prompt = buildCalendarPrompt(task);

    showToast("success", "📅 Creating reminders…",
      `${totalEvents} alerts over ${days.length} day${days.length>1?"s":""} (7AM · 5PM · 8:30PM)`);

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4096,
        messages: [{ role: "user", content: prompt }],
        mcp_servers: [
          { type: "url", url: "https://gcal.mcp.claude.com/mcp", name: "google-calendar" }
        ]
      })
    });

    const data = await response.json();
    const toolResults = data.content?.filter(b => b.type === "mcp_tool_result") || [];
    const textBlock   = data.content?.find(b => b.type === "text");

    if (toolResults.length > 0) {
      showToast("success", `✅ ${toolResults.length} reminders added!`,
        `7:00 AM · 5:00 PM · 8:30 PM for ${days.length} day${days.length>1?"s":""}`);
      return true;
    } else if (textBlock?.text?.toLowerCase().includes("creat")) {
      showToast("success", "📅 Reminders scheduled",
        `3 daily alerts: 7:00 AM · 5:00 PM · 8:30 PM`);
      return true;
    } else {
      showToast("error", "Calendar issue", (textBlock?.text || "No response").slice(0,100));
      return false;
    }
  } catch (err) {
    showToast("error", "Calendar error", err.message);
    return false;
  }
}

// ─── Firebase helpers ─────────────────────────────────────────────────────────

function todayString() {
  return new Date().toISOString().split("T")[0];
}

async function autoResetIfNeeded(id, data) {
  if (data.repeatDaily && data.done && data.lastCompletedDate !== todayString()) {
    await updateDoc(doc(db, "tasks", id), { done: false });
  }
}

// ─── Add task ─────────────────────────────────────────────────────────────────

window.addTask = async function () {
  const text = taskInput.value.trim();
  const deadline = deadlineInput.value;
  const repeatDaily = repeatInput.checked;
  const addCal = gcalInput.checked;

  if (!text || !deadline) { showToast("error", "Missing fields", "Enter a task and deadline."); return; }

  const btn = document.querySelector(".add-btn");
  btn.textContent = "Adding…"; btn.disabled = true;

  const taskData = { text, deadline, done: false, repeatDaily, lastCompletedDate: null, calAdded: false };

  try {
    const ref = await addDoc(tasksCollection, taskData);

    if (addCal) {
      const ok = await addToGoogleCalendar(taskData);
      if (ok) await updateDoc(doc(db, "tasks", ref.id), { calAdded: true });
    } else {
      showToast("success", "Task added", text);
    }

    taskInput.value = ""; deadlineInput.value = ""; repeatInput.checked = false;
  } finally {
    btn.textContent = "+ Add Task"; btn.disabled = false;
  }
};

// ─── Render ───────────────────────────────────────────────────────────────────

function renderTask(id, data) {
  const now = new Date();
  const deadline = new Date(data.deadline);
  const isOverdue = !data.done && deadline < now;

  const item = document.createElement("div");
  item.className = `task-item${data.done ? " completed" : ""}${isOverdue ? " overdue" : ""}`;

  const uid = `chk-${id}`;
  item.innerHTML = `
    <div class="check-wrap">
      <input type="checkbox" id="${uid}" ${data.done ? "checked" : ""}>
      <label for="${uid}"></label>
    </div>
    <div class="task-body">
      <div class="task-text">${escHtml(data.text)}</div>
      <div class="task-meta">
        <span class="task-deadline">⏰ ${deadline.toLocaleString()}</span>
        ${data.repeatDaily ? '<span class="badge daily">Daily</span>' : ""}
        ${data.calAdded ? '<span class="badge cal">📅 Calendar</span>' : ""}
        ${isOverdue ? '<span class="badge" style="background:rgba(248,113,113,0.15);color:var(--danger);border:1px solid rgba(248,113,113,0.3)">Overdue</span>' : ""}
      </div>
    </div>
    <div class="task-actions">
      ${!data.calAdded ? `<button class="icon-btn gcal-btn" title="Add to Google Calendar">📅</button>` : ""}
      <button class="icon-btn danger" title="Delete">✕</button>
    </div>
  `;

  item.querySelector(`#${uid}`).addEventListener("change", async (e) => {
    await updateDoc(doc(db, "tasks", id), {
      done: e.target.checked,
      lastCompletedDate: e.target.checked ? todayString() : null
    });
  });

  const calBtn = item.querySelector(".gcal-btn");
  if (calBtn) {
    calBtn.addEventListener("click", async () => {
      calBtn.textContent = "…"; calBtn.disabled = true;
      const ok = await addToGoogleCalendar(data);
      if (ok) await updateDoc(doc(db, "tasks", id), { calAdded: true });
      else { calBtn.textContent = "📅"; calBtn.disabled = false; }
    });
  }

  item.querySelector(".danger").addEventListener("click", async () => {
    item.style.opacity = "0"; item.style.transform = "translateX(20px)";
    item.style.transition = "all 0.25s";
    setTimeout(() => deleteDoc(doc(db, "tasks", id)), 250);
  });

  taskList.appendChild(item);
}

function updateStats(tasks) {
  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const cal   = tasks.filter(t => t.calAdded).length;
  statsRow.innerHTML = `
    <div class="stat-chip"><strong>${total}</strong> total</div>
    <div class="stat-chip"><strong>${done}</strong> done</div>
    <div class="stat-chip"><strong>${total - done}</strong> pending</div>
    <div class="stat-chip"><strong>${cal}</strong> on calendar</div>
  `;
}

onSnapshot(tasksCollection, async (snapshot) => {
  taskList.innerHTML = "";
  const all = [];
  for (const docSnap of snapshot.docs) {
    const data = docSnap.data();
    await autoResetIfNeeded(docSnap.id, data);
    renderTask(docSnap.id, data);
    all.push(data);
  }
  if (all.length === 0) {
    taskList.innerHTML = `<div class="empty-state"><div class="icon">🗂️</div>No tasks yet — add one above!</div>`;
  }
  updateStats(all);
});

// ─── Toast ────────────────────────────────────────────────────────────────────

function showToast(type, title, detail = "") {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  const icons = { success: "✅", error: "❌" };
  t.innerHTML = `<div class="toast-icon">${icons[type] || "ℹ️"}</div>
    <div class="toast-msg"><b>${escHtml(title)}</b><small>${escHtml(detail)}</small></div>`;
  document.body.appendChild(t);
  t.onclick = () => t.remove();
  setTimeout(() => t.remove(), 5000);
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── Service worker ───────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
</script>
</body>
</html>
